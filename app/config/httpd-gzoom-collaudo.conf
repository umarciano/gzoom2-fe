# =============================================================================
# Apache httpd - VirtualHost GZOOM Collaudo (HTTP :4200)
#
# Installazione sul server di collaudo:
#   sudo cp httpd-gzoom-collaudo.conf /etc/httpd/conf.d/gzoom-collaudo.conf
#   sudo apachectl configtest && sudo systemctl restart httpd
#
# Struttura porte interne:
#   /var/www/html  → Angular (file statici, DocumentRoot, senza sottocartella /gzoom2/)
#   :8080          → Tomcat OFBiz + gzoom-saml-web
#   :8081          → gzoom2-be REST Spring Boot
# =============================================================================

<VirtualHost *:4200>
    ServerName gzoom-appsrv.cardarelli.int

    ErrorLog  /var/log/httpd/gzoom-collaudo-error.log
    CustomLog /var/log/httpd/gzoom-collaudo-access.log combined

    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Angular HTML5 routing: serve index.html per le route Angular
    <Directory /var/www/html/gzoom2>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /gzoom2/index.html
    </Directory>

    ProxyPreserveHost On
    ProxyRequests Off

    # -------------------------------------------------------------------------
    # Angular HTML5 routing: serve index.html per le route Angular
    # -------------------------------------------------------------------------
    RewriteEngine On
    RewriteCond %{REQUEST_URI} ^/(login|error|c/)
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^(.*)$ /gzoom2/index.html [L]

    # -------------------------------------------------------------------------
    # gzoom-saml-web (Tomcat su porta 8080) - CRITICO per SSO
    # -------------------------------------------------------------------------
    ProxyPass        /gzoom-saml-web/  http://localhost:8080/gzoom-saml-web/
    ProxyPassReverse /gzoom-saml-web/  http://localhost:8080/gzoom-saml-web/

    # -------------------------------------------------------------------------
    # gzoom2-be REST (Spring Boot su porta 8081)
    # -------------------------------------------------------------------------
    ProxyPass        /rest/            http://localhost:8081/rest/
    ProxyPassReverse /rest/            http://localhost:8081/rest/

    # -------------------------------------------------------------------------
    # OFBiz / gzoom-legacy (Tomcat su porta 8080)
    # -------------------------------------------------------------------------
    ProxyPass        /gzoom/           http://localhost:8080/gzoom/
    ProxyPassReverse /gzoom/           http://localhost:8080/gzoom/

    ProxyPass        /accountingext/   http://localhost:8080/accountingext/
    ProxyPassReverse /accountingext/   http://localhost:8080/accountingext/

    ProxyPass        /bscperf/         http://localhost:8080/bscperf/
    ProxyPassReverse /bscperf/         http://localhost:8080/bscperf/

    ProxyPass        /cdgperf/         http://localhost:8080/cdgperf/
    ProxyPassReverse /cdgperf/         http://localhost:8080/cdgperf/

    ProxyPass        /commondataext/   http://localhost:8080/commondataext/
    ProxyPassReverse /commondataext/   http://localhost:8080/commondataext/

    ProxyPass        /corperf/         http://localhost:8080/corperf/
    ProxyPassReverse /corperf/         http://localhost:8080/corperf/

    ProxyPass        /custom/          http://localhost:8080/custom/
    ProxyPassReverse /custom/          http://localhost:8080/custom/

    ProxyPass        /dirigperf/       http://localhost:8080/dirigperf/
    ProxyPassReverse /dirigperf/       http://localhost:8080/dirigperf/

    ProxyPass        /emplperf/        http://localhost:8080/emplperf/
    ProxyPassReverse /emplperf/        http://localhost:8080/emplperf/

    ProxyPass        /gdprperf/        http://localhost:8080/gdprperf/
    ProxyPassReverse /gdprperf/        http://localhost:8080/gdprperf/

    ProxyPass        /humanresext/     http://localhost:8080/humanresext/
    ProxyPassReverse /humanresext/     http://localhost:8080/humanresext/

    ProxyPass        /orgperf/         http://localhost:8080/orgperf/
    ProxyPassReverse /orgperf/         http://localhost:8080/orgperf/

    ProxyPass        /partperf/        http://localhost:8080/partperf/
    ProxyPassReverse /partperf/        http://localhost:8080/partperf/

    ProxyPass        /partyext/        http://localhost:8080/partyext/
    ProxyPassReverse /partyext/        http://localhost:8080/partyext/

    ProxyPass        /procperf/        http://localhost:8080/procperf/
    ProxyPassReverse /procperf/        http://localhost:8080/procperf/

    ProxyPass        /productext/      http://localhost:8080/productext/
    ProxyPassReverse /productext/      http://localhost:8080/productext/

    ProxyPass        /rendperf/        http://localhost:8080/rendperf/
    ProxyPassReverse /rendperf/        http://localhost:8080/rendperf/

    ProxyPass        /stratperf/       http://localhost:8080/stratperf/
    ProxyPassReverse /stratperf/       http://localhost:8080/stratperf/

    ProxyPass        /trasperf/        http://localhost:8080/trasperf/
    ProxyPassReverse /trasperf/        http://localhost:8080/trasperf/

    ProxyPass        /workeffortext/   http://localhost:8080/workeffortext/
    ProxyPassReverse /workeffortext/   http://localhost:8080/workeffortext/

    ProxyPass        /theme_gplus/     http://localhost:8080/theme_gplus/
    ProxyPassReverse /theme_gplus/     http://localhost:8080/theme_gplus/

    ProxyPass        /images/          http://localhost:8080/images/
    ProxyPassReverse /images/          http://localhost:8080/images/

    ProxyPass        /resources/       http://localhost:8080/resources/
    ProxyPassReverse /resources/       http://localhost:8080/resources/

</VirtualHost>
